  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    @keyframes oatsPulse{0%,100%{box-shadow:0 8px 30px rgba(255,180,0,.22),0 0 0 0 rgba(255,180,0,.5)}50%{box-shadow:0 8px 34px rgba(255,180,0,.45),0 0 0 10px rgba(255,180,0,0)}}
    :root{
      --gold:#ffb400;
      --bg:#090909;
      --bg2:rgba(10,10,10,0.6);
      --border:rgba(255,180,0,0.2);
      --text:#fff;
      --muted:rgba(255,255,255,0.5);
      --mono:'IBM Plex Mono',monospace;
      --serif:'Playfair Display',Georgia,serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,serif;overflow-x:hidden}

    /* ── SLIDESHOW BACKGROUND ── */
    #slideshow{position:fixed;inset:0;z-index:0;overflow:hidden}
    #slideshow img{position:absolute;inset:-5%;width:110%;height:110%;object-fit:cover;filter:brightness(0.22) saturate(0.5);opacity:0;transition:opacity 1.2s ease-in-out}
    #slideshow img.active{opacity:1}
    #hero-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;width:100%;height:100%}
    #vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 30%,rgba(9,9,9,0.65) 100%)}

    /* ── TICKER ── */
    #ticker-bar{position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(90deg,#090909,#1a1a1a,#090909);border-bottom:1px solid rgba(255,180,0,0.3);overflow:hidden;display:none}
    .ticker-track{display:flex;animation:ticker-scroll 20s linear infinite;white-space:nowrap;padding:8px 0}
    .ticker-text{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);padding:0 48px}
    @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* ── NAV ── */
    #nav-wrap{position:fixed;left:0;right:0;z-index:200;background:rgba(9,9,9,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.07)}
    #nav-top{display:flex;align-items:center;justify-content:space-between;height:36px;padding:0 20px;border-bottom:1px solid rgba(255,255,255,0.04)}
    #nav-logo{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.15em;color:var(--gold);cursor:pointer}
    #nav-version{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,0.28)}
    #photos-btn{background:none;border:1px solid rgba(255,180,0,0.35);color:var(--gold);font-family:var(--mono);font-size:9px;cursor:pointer;letter-spacing:.1em;padding:3px 10px}
    #nav-tabs{display:flex;align-items:center;gap:18px;height:32px;padding:0 20px;overflow-x:auto}
    .nav-tab{background:none;border:none;color:rgba(255,255,255,0.45);font-family:var(--mono);font-size:9px;cursor:pointer;letter-spacing:.1em;padding:0;white-space:nowrap;flex-shrink:0;transition:color .2s}
    .nav-tab.active,.nav-tab:hover{color:var(--gold)}

    /* ── MAIN CONTENT ── */
    #app{position:relative;z-index:3;max-width:900px;margin:0 auto;padding:120px 32px 80px}

    /* ── BACK BUTTON ── */
    @keyframes back-pulse{0%,100%{opacity:1;text-shadow:0 0 8px #ffb400,0 0 20px #ffb400,0 0 40px rgba(255,180,0,.6)}50%{opacity:.6;text-shadow:0 0 4px #ffb400,0 0 10px rgba(255,180,0,.4)}}
    @keyframes back-border-pulse{0%,100%{box-shadow:0 0 8px rgba(255,180,0,.8),0 0 20px rgba(255,180,0,.4),inset 0 0 8px rgba(255,180,0,.1);border-color:#ffb400}50%{box-shadow:0 0 4px rgba(255,180,0,.4),0 0 10px rgba(255,180,0,.2),inset 0 0 4px rgba(255,180,0,.05);border-color:rgba(255,180,0,.6)}}
    .back-btn{background:none;border:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:11px;cursor:pointer;padding:8px 16px;margin-bottom:32px;letter-spacing:.15em;display:flex;align-items:center;gap:8px;animation:back-border-pulse 1.8s ease-in-out infinite;transition:all .15s}
    .back-btn span{animation:back-pulse 1.8s ease-in-out infinite}
    .back-btn:hover{animation:none!important;box-shadow:0 0 16px rgba(255,180,0,1),0 0 40px rgba(255,180,0,.6),inset 0 0 12px rgba(255,180,0,.2)!important;border-color:#ffb400!important;background:rgba(255,180,0,.08)!important}
    .back-btn:hover span{animation:none!important;text-shadow:0 0 12px #ffb400,0 0 30px #ffb400,0 0 60px rgba(255,180,0,.8)!important}

    /* ── CARDS ── */
    .card{border:1px solid rgba(255,255,255,0.1);background:var(--bg2);padding:24px 22px;cursor:pointer;transition:all .2s;position:relative;backdrop-filter:blur(6px)}
    .card:hover{border-color:var(--gold);background:rgba(255,180,0,.05)}
    .card-icon{font-size:20px;margin-bottom:8px;color:var(--gold)}
    .card-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--gold);margin-bottom:6px;text-transform:uppercase}
    .card-tagline{color:rgba(255,255,255,.55);font-size:13px;line-height:1.5}
    .card-view{position:absolute;bottom:14px;right:16px;font-family:var(--mono);font-size:10px;color:var(--gold);display:none}
    .card:hover .card-view{display:block}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .card-grid-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

    /* ── SECTION HEADERS ── */
    .sec-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--gold);margin-bottom:12px}
    .sec-title{font-family:var(--serif);font-size:clamp(28px,5vw,52px);font-weight:900;margin:0 0 12px;letter-spacing:-.02em}
    .sec-desc{color:rgba(255,255,255,.5);font-size:15px;line-height:1.75;max-width:540px;margin-bottom:36px}

    /* ── HOME ── */
    .home-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--gold);margin-bottom:16px}
    .home-title{font-family:var(--serif);font-size:clamp(42px,7vw,88px);font-weight:900;line-height:1;letter-spacing:-.03em;margin:0 0 20px}
    .home-title span{color:var(--gold)}
    .home-desc{font-size:clamp(14px,2vw,18px);color:rgba(255,255,255,.55);max-width:560px;line-height:1.75;margin:0 0 32px}
    .home-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:64px}
    .btn-primary{background:var(--gold);color:#0a0a0a;border:none;padding:13px 28px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.1em}
    .btn-secondary{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:13px 28px;font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:.1em}
    .btn-ghost{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:13px 28px;font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:.1em}

    /* ── AI ROUTER ── */
    .ai-box{border:1px solid var(--border);padding:24px 28px;background:rgba(9,9,9,.7);margin-bottom:64px;backdrop-filter:blur(4px)}
    .ai-label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--gold);margin-bottom:4px}
    .ai-sublabel{color:rgba(255,255,255,.35);font-size:12px;margin-bottom:16px;font-family:var(--mono)}
    .ai-row{display:flex;gap:10px}
    .ai-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);padding:10px 14px;color:#fff;font-family:var(--mono);font-size:13px;outline:none}
    .ai-btn{background:var(--gold);color:#0a0a0a;border:none;padding:10px 20px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.08em;white-space:nowrap}
    .ai-btn:disabled{background:rgba(255,180,0,.3);cursor:wait}
    .ai-q{margin-top:14px;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.3)}
    .ai-reply{background:rgba(255,180,0,.06);border:1px solid rgba(255,180,0,.25);border-radius:4px;padding:14px 18px;margin-top:10px;font-family:var(--mono);font-size:13px;color:#e8d5a3;line-height:1.7}
    .ai-reply-label{color:var(--gold);margin-right:8px}
    .ai-route-btn{display:block;margin-top:12px;background:var(--gold);color:#0a0a0a;border:none;padding:7px 16px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.08em}

    /* ── UNIVERSE LABEL ── */
    .universe-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-bottom:20px}

    /* ── FOOTER ── */
    .footer{margin-top:60px;border-top:1px solid rgba(255,255,255,.06);padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .footer span{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.2)}

    /* ── DETAIL PAGE ── */
    .detail-wrap{max-width:680px;margin:0 auto;padding:0 0 60px}
    .detail-icon{font-size:30px;margin-bottom:10px;color:var(--gold)}
    .detail-title{font-family:var(--serif);font-size:clamp(28px,5vw,48px);font-weight:900;margin:0 0 8px;letter-spacing:-.02em}
    .detail-sub{color:var(--gold);font-family:var(--mono);font-size:11px;letter-spacing:.12em;margin-bottom:24px}
    .detail-desc{color:rgba(255,255,255,.7);font-size:15px;line-height:1.8;margin-bottom:28px}
    .bullet-list{margin-bottom:36px}
    .bullet-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;color:rgba(255,255,255,.65);font-size:14px}
    .bullet-dot{color:var(--gold);margin-top:2px;flex-shrink:0}
    .inquiry-box{border:1px solid rgba(255,180,0,.2);padding:28px 24px;background:rgba(255,180,0,.03);margin-bottom:20px}
    .inquiry-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--gold);margin-bottom:20px}
    .field-label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.4);margin-bottom:6px}
    .field-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);padding:10px 12px;color:#fff;font-family:var(--mono);font-size:13px;outline:none;box-sizing:border-box;margin-bottom:16px}
    .field-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);padding:10px 12px;color:#fff;font-family:var(--mono);font-size:13px;outline:none;resize:vertical;box-sizing:border-box;margin-bottom:20px}
    .submit-btn{background:var(--gold);color:#0a0a0a;border:none;padding:12px 28px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.12em}
    .submit-btn:disabled{background:rgba(255,180,0,.3);cursor:not-allowed}
    .direct-email{margin-top:12px;font-size:11px;color:rgba(255,255,255,.25);font-family:var(--mono)}
    .calendly-box{padding:20px 24px;border:1px solid rgba(255,255,255,.06)}
    .calendly-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.3);margin-bottom:10px}
    .calendly-btn{background:none;border:1px solid rgba(255,180,0,.4);color:var(--gold);padding:10px 22px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.1em}
    .brand-note{padding:20px 24px;border:1px solid rgba(255,180,0,.15);background:rgba(255,180,0,.02)}
    .brand-note-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.3);margin-bottom:8px}
    .brand-note-text{color:rgba(255,255,255,.4);font-size:13px;line-height:1.6}

    /* ── ABOUT ── */
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .about-link-btn{background:none;border:1px solid rgba(255,255,255,.08);padding:14px 16px;color:rgba(255,255,255,.5);font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;text-align:left}
    .about-link-btn span{color:var(--gold);margin-right:8px}

    /* ── GALLERY ── */
    #gallery{position:fixed;inset:0;z-index:300;background:rgba(9,9,9,.97);overflow-y:auto;padding:80px 32px 60px;display:none}
    .gallery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;max-width:900px;margin-left:auto;margin-right:auto}
    .gallery-count{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--gold)}
    .gallery-close{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:var(--mono);font-size:11px;padding:8px 16px;cursor:pointer}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;max-width:900px;margin:0 auto}
    .gallery-thumb{aspect-ratio:16/9;background-size:cover;background-position:center;cursor:pointer;filter:brightness(.75);transition:all .2s}
    .gallery-thumb:hover{filter:brightness(1);transform:scale(1.02)}

    /* ── LIGHTBOX ── */
    #lightbox{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;cursor:zoom-out}
    #lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
    #lightbox-counter{position:absolute;bottom:24px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3)}
    .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:none;border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--mono);font-size:18px;padding:12px 18px;cursor:pointer}
    #lb-prev{left:24px}
    #lb-next{right:24px}

    /* form error/success */
    .form-err{color:#ff5555;font-family:var(--mono);font-size:11px;margin-bottom:12px}
    .form-success{color:var(--gold);font-family:var(--mono);font-size:13px;line-height:1.8}
  </style>
</head>

// ── CANVAS ────────────────────────────────────────────────────────────────────
(function() {
  var canvas = document.getElementById("hero-canvas");
  var ctx = canvas.getContext("2d");
  var dots = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    dots = Array.from({length:40}, function() {
      return { x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: 0.5+Math.random()*1.5, alpha: 0.05+Math.random()*0.12, pulse: Math.random()*Math.PI*2 };
    });
  }
  resize();
  window.addEventListener("resize", resize);
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.025)"; ctx.lineWidth = 0.5;
    for (var x = 0; x < canvas.width; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    for (var y = 0; y < canvas.height; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
    dots.forEach(function(d) {
      d.pulse += 0.015;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,180,0,"+(d.alpha*(0.5+0.5*Math.sin(d.pulse)))+")";
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── AI ROUTER ─────────────────────────────────────────────────────────────────
function routeQuery(text) {
  var t = text.toLowerCase();
  for (var item of AI_KEYWORDS) {
    if (item.keywords.some(function(k){ return t.includes(k); })) return item;
  }
  return null;
}

function handleAI(inputId, repliesId) {
  var input = document.getElementById(inputId);
  var q = input.value.trim();
  if (!q || aiTyping) return;
  input.value = "";
  aiTyping = true;
  setTimeout(function() {
    aiTyping = false;
    var route = routeQuery(q);
    var msg = route
      ? "Got it. Based on what you're describing, the right place is \"" + route.label + "\" — " + route.tagline + " Let me point you there."
      : "Tell me a bit more about what you're looking for — services, brands, music, stories, or something else?";
    aiReplies.push({q, msg, route});
    renderView(currentView);
  }, 700 + Math.random()*400);
  renderView(currentView);
}

function routeClick(route) {
  if (route.type === "dept") showView("dept:" + route.id);
  else showView("section:" + route.id);
}

    stage.style.cssText="position:relative;width:100%;padding-bottom:56.25%;height:0;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 18px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,180,0,.28)";
    liveWrap.appendChild(stage);
    var gridLabel = el("div"); gridLabel.style.cssText="font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.4);margin:18px 0 10px;text-transform:uppercase"; gridLabel.textContent="RECENT UPLOADS";
    var grid = el("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px";
    var liveNote = el("div"); liveNote.style.cssText="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.45);margin:14px 0 4px;line-height:1.7;letter-spacing:.04em";
    function noteHtml(extra){ return extra +
      "<a href='https://www.youtube.com/channel/" + SITE.youtube.channelId + "/videos' target='_blank' rel='noopener' style='color:var(--gold);text-decoration:none'>All videos \u2197</a>" +
      " \u00b7 <a href='https://www.youtube.com/channel/" + SITE.youtube.channelId + "?sub_confirmation=1' target='_blank' rel='noopener' style='color:var(--gold);text-decoration:none'>Subscribe \u2197</a>"; }

    function playInStage(id, live){
      stage.innerHTML="";
      stage.style.boxShadow="0 18px 60px rgba(0,0,0,.6), 0 0 0 1px " + (live?"rgba(255,59,59,.45)":"rgba(255,180,0,.28)") + (live?", 0 0 40px rgba(255,59,59,.18)":"");
      var ifr=document.createElement("iframe");
      var host = live ? "https://www.youtube.com" : "https://www.youtube-nocookie.com";
      ifr.src=host+"/embed/"+id+"?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1&color=white&iv_load_policy=3&vq=hd720";
      ifr.style.cssText="position:absolute;top:0;left:0;width:100%;height:100%;border:0";
      ifr.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      ifr.setAttribute("allowfullscreen",""); ifr.title="EDM OATS"; stage.appendChild(ifr);
    }
    function posterInStage(id, live, label){
      stage.innerHTML="";
      stage.style.boxShadow="0 18px 60px rgba(0,0,0,.6), 0 0 0 1px " + (live?"rgba(255,59,59,.45)":"rgba(255,180,0,.28)") + (live?", 0 0 40px rgba(255,59,59,.18)":"");
      var poster=el("div"); poster.style.cssText="position:absolute;inset:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden";
      var im=document.createElement("img"); im.src="https://i.ytimg.com/vi/"+id+"/maxresdefault.jpg"; im.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover";
      im.onerror=function(){ if(this.src.indexOf("maxres")>-1)this.src="https://i.ytimg.com/vi/"+id+"/sddefault.jpg"; else if(this.src.indexOf("sddefault")>-1)this.src="https://i.ytimg.com/vi/"+id+"/hqdefault.jpg"; };
      poster.appendChild(im);
      var sh=el("div"); sh.style.cssText="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.55))"; poster.appendChild(sh);
      var acc=live?"#ff3b3b":"var(--gold)";
      var b=el("div"); b.style.cssText="position:relative;width:88px;height:88px;border-radius:50%;background:"+acc+";display:flex;align-items:center;justify-content:center;box-shadow:0 0 36px "+(live?"rgba(255,59,59,.55)":"rgba(255,180,0,.5)")+";transition:transform .15s";
      b.innerHTML="<span style='color:"+(live?"#fff":"#0a0a0a")+";font-size:36px;margin-left:6px'>\u25B6</span>"; poster.appendChild(b);
      var l=el("div"); l.style.cssText="position:relative;margin-top:16px;font-family:var(--mono);font-size:12px;letter-spacing:.2em;color:#fff;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.7)"; l.textContent=label; poster.appendChild(l);
      poster.onmouseenter=function(){ b.style.transform="scale(1.08)"; }; poster.onmouseleave=function(){ b.style.transform="scale(1)"; };
      poster.onclick=function(){ playInStage(id, live); };
      stage.appendChild(poster);
    }
    function addThumb(id,title){
      var t=el("div"); t.style.cssText="position:relative;padding-bottom:56.25%;height:0;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,180,0,.18)";
      var im=document.createElement("img"); im.src="https://i.ytimg.com/vi/"+id+"/hqdefault.jpg"; im.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"; t.appendChild(im);
      var pl=el("div"); pl.style.cssText="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.15);transition:background .15s"; pl.innerHTML="<span style='color:#fff;font-size:22px;text-shadow:0 2px 6px rgba(0,0,0,.7)'>\u25B6</span>"; t.appendChild(pl);
      if(title) t.title=title;
      t.onmouseenter=function(){ pl.style.background="rgba(0,0,0,.35)"; }; t.onmouseleave=function(){ pl.style.background="rgba(0,0,0,.15)"; };
      t.onclick=function(){ playInStage(id,false); window.scrollTo({top:liveWrap.offsetTop-90,behavior:"smooth"}); };
      grid.appendChild(t);
    }

    function renderLive(id){
      liveTag.style.color="#ff3b3b"; liveTag.innerHTML="<span style='width:8px;height:8px;border-radius:50%;background:#ff3b3b;box-shadow:0 0 8px #ff3b3b;display:inline-block'></span> LIVE NOW \u2014 EDM OATS";
      // remove grid first so the live video does not compete for bandwidth, then autoplay
      if(grid.parentNode){ grid.parentNode.removeChild(grid); } if(gridLabel.parentNode){ gridLabel.parentNode.removeChild(gridLabel); }
      playInStage(id, true);
      liveNote.innerHTML = noteHtml("Streaming now \u2014 tap to unmute. ");
    }
    function renderPlaylist(items){
      liveTag.style.color="var(--gold)"; liveTag.textContent="\u25C9 EDM OATS \u2014 LATEST";
      // Offline always headlines the featured video (Ferry Corsten Chicago = fallbackVideoId)
      var featured = SITE.youtube.fallbackVideoId || "_xyCffufcbs";
      posterInStage(featured, false, "PLAY \u2014 WITH SOUND");
      grid.innerHTML="";
      (items||[]).forEach(function(v){ addThumb(v.id, v.title); });
      if(!grid.parentNode){ liveWrap.insertBefore(gridLabel, liveNote); liveWrap.insertBefore(grid, liveNote); }
      liveNote.innerHTML = noteHtml("Pick a video \u2014 plays with sound. ");
    }

    liveWrap.appendChild(liveNote);
    app.appendChild(liveWrap);

    // Seed instantly with fallback poster so it's never blank while the API responds
    posterInStage(SITE.youtube.fallbackVideoId||"_xyCffufcbs", false, "PLAY \u2014 WITH SOUND");

    (function(){
      var K=SITE.youtube.apiKey, CID=SITE.youtube.channelId;
      if(!K){ return; }
      // 1) live check
      fetch("https://www.googleapis.com/youtube/v3/search?part=snippet&channelId="+CID+"&eventType=live&type=video&maxResults=1&key="+K)
        .then(function(r){return r.json();}).then(function(d){
          if(d && d.items && d.items.length && d.items[0].id && d.items[0].id.videoId){
            renderLive(d.items[0].id.videoId); return;
          }
          // 2) not live -> uploads playlist
          return fetch("https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=UU"+CID.slice(2)+"&maxResults=12&key="+K)
            .then(function(r){return r.json();}).then(function(p){
              var items=(p.items||[]).map(function(it){ return {id:it.snippet.resourceId.videoId, title:it.snippet.title}; });
              renderPlaylist(items);
            });
        }).catch(function(){ /* leave seeded poster */ });
    })();

    app.appendChild(detailPage({
      icon:"⊕", label:"EDM Oatmeal",
      desc:"Live feed for the EDM and touring world. News, ground crew updates, and the people in it. Built by crew, for crew.",
      bullets:["EDM & touring news","Ground crew updates","Event tracking","@theoats on Instagram","Go4Oats Show on YouTube"]
    }, "home", false));
    return;
  }

  // SECTION: CONNECT
  if (view === "section:connect") {
    app.appendChild(detailPage({
      icon:"◆", label:"Connect",
      desc:"All the places to find me and the projects. Reach out for work, follow along, or just say what's up.",
      bullets:["Instagram: @theoats — main feed","Instagram / Threads: @sleepwellsweetheart — band + music","YouTube: Go4Oats Show — long-form","YouTube: A.I. Oatmeal — AI content","Email: fookn.oats.enterprises@gmail.com","Book a call — link below"]
    }, "home", false));
    return;
  }

  // SECTION: ABOUT
  if (view === "section:about") {
    var wrap = el("div","");
    wrap.style.maxWidth = "620px";
    wrap.appendChild(backBtn("home"));
    wrap.appendChild(el("div","sec-tag","ABOUT"));
    var h2 = el("h2","sec-title"); h2.innerHTML = "Built on<br>the Road."; wrap.appendChild(h2);
    wrap.style.cssText = "max-width:620px";
    var paraStyles = [
      "color:rgba(255,255,255,.72);font-size:17px;line-height:1.75;margin-bottom:20px",
      "color:rgba(255,255,255,.60);font-size:15px;line-height:1.85;margin-bottom:20px",
      "color:rgba(255,255,255,.50);font-size:15px;line-height:1.85;margin-bottom:20px",
      "color:rgba(255,255,255,.43);font-size:15px;line-height:1.85;margin-bottom:36px"
    ];
    (SITE.about.paragraphs || []).forEach(function(text, i) {
      var p = el("p"); p.style.cssText = paraStyles[Math.min(i, paraStyles.length - 1)]; p.textContent = text; wrap.appendChild(p);
    });

    var aiSm = el("div",""); aiSm.style.cssText="border:1px solid rgba(255,180,0,.2);padding:22px;background:rgba(255,180,0,.02);margin-bottom:28px";
    var ail = el("div","",""); ail.style.cssText="font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--gold);margin-bottom:14px"; ail.textContent="◆ ASK ME ANYTHING"; aiSm.appendChild(ail);
    var airow = el("div","ai-row");
    var aiinp = el("input"); aiinp.type="text"; aiinp.id="ai-input-about"; aiinp.className="ai-input"; aiinp.placeholder="What do you want to know?";
    aiinp.onkeydown = function(e){ if(e.key==="Enter") handleAI("ai-input-about","ai-replies-about"); };
    var aibtn = el("button","ai-btn","ASK");
    aibtn.onclick = function(){ handleAI("ai-input-about","ai-replies-about"); };
    airow.appendChild(aiinp); airow.appendChild(aibtn); aiSm.appendChild(airow);
    var aboutReplies = el("div"); aboutReplies.id="ai-replies-about";
    aiReplies.slice(-2).forEach(function(r) {
      var qDiv = el("div","ai-q","→ "+r.q); aboutReplies.appendChild(qDiv);
      var rep = el("div","ai-reply");
      rep.innerHTML = '<span class="ai-reply-label">◆ OATS →</span>'+r.msg;
      if (r.route) { var rb=el("button","ai-route-btn","OPEN "+r.route.label.toUpperCase()+" →"); rb.onclick=function(){routeClick(r.route);}; rep.appendChild(rb); }
      aboutReplies.appendChild(rep);
    });
    aiSm.appendChild(aboutReplies);
    wrap.appendChild(aiSm);

    var agrid = el("div","about-grid");
    SECTIONS.filter(function(s){return s.id!=="about";}).forEach(function(s) {
      var btn = el("button","about-link-btn"); btn.innerHTML="<span>"+s.icon+"</span>"+s.label;
      btn.onclick = function(){ showView("section:"+s.id); };
      agrid.appendChild(btn);
    });
    wrap.appendChild(agrid);
    app.appendChild(wrap);
    return;
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
// ── HASH ROUTING ──────────────────────────────────────────────────────────────
// view "section:edm" -> "#edm", "dept:cad" -> "#cad", "brand:revelator" -> "#revelator", "home" -> ""
function viewToHash(view){
  if(!view || view==="home") return "";
  return "#" + view.replace(/^(section:|dept:|brand:)/,"");
}
function hashToView(hash){
  var h=(hash||"").replace(/^#/,"").toLowerCase();
  if(!h) return "home";
  var depts=["cad","gaffer","led","consult","makerlab","designnet"];
  var brands=["revelator","sleepwell","aioatmeal","ghosted","crypto","fallingstar"];
  var sections=["services","brands","studio","stories","edm","about","connect"];
  if(depts.indexOf(h)>=0) return "dept:"+h;
  if(brands.indexOf(h)>=0) return "brand:"+h;
  if(sections.indexOf(h)>=0) return "section:"+h;
  return "home";
}
var _routing=true;
function showView(view) {
  currentView = view;
  renderView(view);
  window.scrollTo(0,0);
  if(_routing){ var nh=viewToHash(view); if((location.hash||"")!==nh){ try{ history.pushState(null,"",nh||location.pathname); }catch(e){ location.hash=nh; } } }
}
window.addEventListener("hashchange", function(){ _routing=false; showView(hashToView(location.hash)); _routing=true; });
window.addEventListener("popstate", function(){ _routing=false; showView(hashToView(location.hash)); _routing=true; });

// ── CALENDLY ─────────────────────────────────────────────────────────────────
window.addEventListener("load", function() {
  if (window.Calendly) {
    Calendly.initBadgeWidget({
      url: SITE.calendly.url,
      text: SITE.calendly.text,
      color: SITE.calendly.color,
      textColor: SITE.calendly.textColor,
      branding: true
    });
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────────
showView(hashToView(location.hash));
</script>
