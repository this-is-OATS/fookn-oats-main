<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rolled &amp; Recorded — EDM Oatmeal Presents</title>
  <meta name="description" content="A digital festival day. Live from the studio. EDM Oatmeal Presents: Rolled &amp; Recorded."/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="EDM Oatmeal Presents: Rolled &amp; Recorded"/>
  <meta property="og:description" content="A digital festival day. Recorded from the studio."/>
  <meta property="og:image" content="https://fookn-oats.enterprises/edm-lite-og.png"/>
  <meta property="og:url" content="https://fookn-oats.enterprises/rolled-recorded"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="EDM Oatmeal Presents: Rolled &amp; Recorded"/>
  <meta name="twitter:description" content="A digital festival day. Recorded from the studio."/>
  <meta name="twitter:image" content="https://fookn-oats.enterprises/edm-lite-og.png"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#ffb400;
      --bg:#090909;
      --bg2:rgba(14,14,14,0.9);
      --border:rgba(255,180,0,0.18);
      --text:#fff;
      --muted:rgba(255,255,255,0.45);
      --mono:'IBM Plex Mono',monospace;
      --serif:'Playfair Display',Georgia,serif;
    }
    html,body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100%;overflow-x:hidden}

    /* ── HERO ── */
    #hero{
      min-height:100svh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;padding:80px 24px 100px;position:relative;
    }
    #hero-glow{
      position:absolute;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 70% 55% at 50% 42%, rgba(255,180,0,0.07) 0%, transparent 100%),
        radial-gradient(circle at 18% 78%, rgba(255,180,0,0.04) 0%, transparent 40%),
        radial-gradient(circle at 82% 18%, rgba(255,180,0,0.03) 0%, transparent 38%);
    }
    .hero-eyebrow{
      font-family:var(--mono);font-size:10px;letter-spacing:.35em;
      color:var(--gold);text-transform:uppercase;margin-bottom:22px;
      position:relative;display:flex;align-items:center;gap:14px;justify-content:center;
    }
    .hero-eyebrow::before,.hero-eyebrow::after{
      content:'';display:block;width:36px;height:1px;
      background:rgba(255,180,0,0.45);flex-shrink:0;
    }
    .hero-title{
      font-family:var(--serif);font-weight:900;
      font-size:clamp(56px,14vw,128px);
      line-height:.88;letter-spacing:-.02em;
      position:relative;
    }
    .hero-title .line2{display:block}
    .hero-amp{color:var(--gold);font-style:italic}
    .hero-tagline{
      font-family:var(--mono);font-size:clamp(9px,1.8vw,12px);
      letter-spacing:.28em;color:var(--muted);text-transform:uppercase;
      margin-top:22px;
    }
    .hero-badge{
      display:inline-flex;align-items:center;gap:8px;
      margin-top:34px;
      font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
      background:var(--gold);color:#080808;padding:7px 20px;font-weight:700;
    }
    .hero-badge.live{background:#ff3b3b;color:#fff}
    .hero-badge.live::before{
      content:'';width:7px;height:7px;border-radius:50%;
      background:#fff;box-shadow:0 0 6px #fff;flex-shrink:0;
    }
    .hero-scroll{
      position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
      font-family:var(--mono);font-size:8px;letter-spacing:.22em;
      color:rgba(255,255,255,0.22);text-transform:uppercase;
      animation:bob 2.2s ease-in-out infinite;
    }
    @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

    /* ── SECTION WRAPPER ── */
    .section{max-width:820px;margin:0 auto;padding:80px 24px 0}
    .section:last-of-type{padding-bottom:80px}
    .section-label{
      font-family:var(--mono);font-size:9px;letter-spacing:.26em;
      color:var(--gold);text-transform:uppercase;
      display:flex;align-items:center;gap:14px;margin-bottom:36px;
    }
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ── CONCEPT ── */
    .concept-headline{
      font-family:var(--serif);font-weight:700;
      font-size:clamp(20px,4vw,34px);line-height:1.2;
      margin-bottom:18px;
    }
    .concept-body{
      font-size:15px;line-height:1.82;
      color:rgba(255,255,255,0.7);max-width:620px;
    }

    /* ── LINEUP ── */
    .lineup-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
      gap:14px;
    }
    .artist-card{
      border:1px solid var(--border);background:var(--bg2);
      padding:22px 20px;backdrop-filter:blur(6px);
      transition:border-color .18s,background .18s;
    }
    .artist-card:hover{border-color:var(--gold);background:rgba(255,180,0,.035)}
    .artist-name{font-family:var(--serif);font-weight:700;font-size:19px;margin-bottom:5px;line-height:1.1}
    .artist-role{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
    .artist-time{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:10px;letter-spacing:.05em}
    .artist-bio{font-size:13px;color:rgba(255,255,255,0.55);margin-top:10px;line-height:1.55}
    .tba-block{
      border:1px dashed rgba(255,180,0,0.18);
      padding:48px 32px;text-align:center;grid-column:1/-1;
    }
    .tba-title{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-bottom:10px}
    .tba-sub{font-size:13px;color:rgba(255,255,255,0.25);line-height:1.6}

    /* ── SCHEDULE ── */
    .schedule-list{display:flex;flex-direction:column}
    .schedule-row{
      display:grid;grid-template-columns:90px 1fr;gap:16px;
      align-items:baseline;padding:15px 0;
      border-bottom:1px solid rgba(255,255,255,0.055);
    }
    .schedule-row:last-child{border-bottom:none}
    .sch-time{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.04em}
    .sch-label{font-family:var(--mono);font-size:13px;letter-spacing:.04em}
    .sch-note{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}

    /* ── RSVP ── */
    .rsvp-card{
      border:1px solid var(--border);background:var(--bg2);
      padding:38px 36px;backdrop-filter:blur(6px);
    }
    .rsvp-heading{font-family:var(--serif);font-weight:700;font-size:26px;margin-bottom:8px}
    .rsvp-body{font-size:14px;color:var(--muted);margin-bottom:26px;line-height:1.65}
    .rsvp-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .rsvp-input{
      flex:1;min-width:130px;
      background:rgba(0,0,0,0.45);border:1px solid rgba(255,180,0,0.18);
      color:#fff;font-family:var(--mono);font-size:13px;
      padding:12px 14px;outline:none;transition:border-color .2s;
    }
    .rsvp-input:focus{border-color:rgba(255,180,0,0.55)}
    .rsvp-input::placeholder{color:rgba(255,255,255,0.28)}
    .rsvp-btn{
      flex:0 0 auto;background:var(--gold);color:#080808;border:none;
      font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.15em;
      padding:12px 26px;cursor:pointer;text-transform:uppercase;transition:opacity .18s;
    }
    .rsvp-btn:hover{opacity:.82}
    .rsvp-btn:disabled{opacity:.35;cursor:default}
    .rsvp-status{font-family:var(--mono);font-size:11px;letter-spacing:.04em;min-height:18px}

    /* ── DIVIDER ── */
    .divider{max-width:820px;margin:0 auto;padding:0 24px}
    .divider hr{border:none;border-top:1px solid rgba(255,255,255,0.055)}

    /* ── FOOTER ── */
    #footer{
      border-top:1px solid rgba(255,255,255,0.055);
      padding:44px 24px 40px;text-align:center;
    }
    .footer-links{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
    .footer-link{
      font-family:var(--mono);font-size:9px;letter-spacing:.16em;
      color:var(--muted);text-transform:uppercase;text-decoration:none;
      transition:color .18s;
    }
    .footer-link:hover{color:var(--gold)}
    .footer-brand{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:rgba(255,255,255,0.18)}

    @media(max-width:480px){
      .section{padding:60px 18px 0}
      .rsvp-card{padding:26px 20px}
      .rsvp-row{flex-direction:column}
      .rsvp-btn{width:100%;text-align:center}
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
var RR_VERSION='rr-v1.0 · 2026.06.28'; // ← bump on every R&R deploy
(function(){
  var root=document.getElementById('root');

  function div(cls){var e=document.createElement('div');if(cls)e.className=cls;return e;}
  function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
  function txt(e,t){e.textContent=t;return e;}

  /* ── HERO ── */
  function renderHero(ev){
    var hero=div();hero.id='hero';
    var glow=div();glow.id='hero-glow';hero.appendChild(glow);

    var eyebrow=div('hero-eyebrow');txt(eyebrow,ev.presenter||'EDM Oatmeal');
    hero.appendChild(eyebrow);

    var h1=el('h1','hero-title');
    var nameParts=(ev.name||'Rolled & Recorded').split('&');
    h1.innerHTML=nameParts[0]+'<span class="hero-amp">&</span>'+(nameParts[1]||'');
    hero.appendChild(h1);

    var tagline=div('hero-tagline');txt(tagline,ev.tagline||'A Digital Festival Day');
    hero.appendChild(tagline);

    var isLive=ev.status==='live';
    var badge=div('hero-badge'+(isLive?' live':''));
    var badgeText=isLive?'Live Now':((ev.dateDisplay&&ev.dateDisplay!=='Date TBA')?ev.dateDisplay:'Coming Soon');
    txt(badge,badgeText);
    hero.appendChild(badge);

    var scroll=div('hero-scroll');txt(scroll,'↓ scroll');
    hero.appendChild(scroll);

    root.appendChild(hero);
  }

  /* ── CONCEPT ── */
  function renderConcept(c){
    if(!c) return;
    var sec=div('section');
    var label=div('section-label');txt(label,'What Is This');sec.appendChild(label);
    var h2=el('h2','concept-headline');txt(h2,c.headline||'');sec.appendChild(h2);
    var body=div('concept-body');txt(body,c.body||'');sec.appendChild(body);
    root.appendChild(sec);
  }

  /* ── LINEUP ── (only shown when artists are confirmed) */
  function renderLineup(lineup){
    if(!lineup||!lineup.length) return;
    var sec=div('section');
    var label=div('section-label');txt(label,'Lineup');sec.appendChild(label);
    var grid=div('lineup-grid');
    lineup.forEach(function(a){
      var card=div('artist-card');
      var name=div('artist-name');txt(name,a.name||'');card.appendChild(name);
      if(a.role){var role=div('artist-role');txt(role,a.role);card.appendChild(role);}
      if(a.setTime){var st=div('artist-time');txt(st,a.setTime);card.appendChild(st);}
      if(a.bio){var bio=div('artist-bio');txt(bio,a.bio);card.appendChild(bio);}
      grid.appendChild(card);
    });
    sec.appendChild(grid);root.appendChild(sec);
  }

  /* ── SCHEDULE ── (only shown when times are set) */
  function renderSchedule(sched){
    if(!sched||!sched.length) return;
    var hasRealTimes=sched.some(function(s){return s.time&&s.time!=='TBD'&&s.time!=='';});
    if(!hasRealTimes) return;
    var sec=div('section');
    var label=div('section-label');txt(label,'Run of Show');sec.appendChild(label);
    var list=div('schedule-list');
    sched.forEach(function(item){
      var row=div('schedule-row');
      var time=div('sch-time');txt(time,item.time||'TBD');row.appendChild(time);
      var right=div();
      var lbl=div('sch-label');txt(lbl,item.label||'');right.appendChild(lbl);
      if(item.note){var note=div('sch-note');txt(note,item.note);right.appendChild(note);}
      row.appendChild(right);list.appendChild(row);
    });
    sec.appendChild(list);root.appendChild(sec);
  }

  /* ── RSVP ── */
  function renderRSVP(rsvp){
    if(!rsvp||!rsvp.enabled) return;
    var sec=div('section');
    var label=div('section-label');txt(label,'Stay in the Loop');sec.appendChild(label);
    var card=div('rsvp-card');
    var h2=el('h2','rsvp-heading');txt(h2,rsvp.heading||'Stay in the Loop');card.appendChild(h2);
    var body=div('rsvp-body');txt(body,rsvp.body||'');card.appendChild(body);

    var nameIn=el('input','rsvp-input');nameIn.type='text';nameIn.placeholder='Name (optional)';
    var emailIn=el('input','rsvp-input');emailIn.type='email';emailIn.placeholder='Email address';
    emailIn.style.flex='2';
    var btn=el('button','rsvp-btn');txt(btn,'Notify Me');
    var status=div('rsvp-status');

    var row=div('rsvp-row');
    row.appendChild(nameIn);row.appendChild(emailIn);row.appendChild(btn);
    card.appendChild(row);card.appendChild(status);
    sec.appendChild(card);root.appendChild(sec);

    function submit(){
      var email=emailIn.value.trim();
      if(!email){emailIn.focus();return;}
      btn.disabled=true;txt(btn,'…');status.textContent='';
      fetch('https://formspree.io/f/'+(rsvp.formspreeId||''),{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({
          _subject:'🥣 Rolled & Recorded — RSVP',
          name:nameIn.value.trim()||'anon',
          email:email,
          source:'rolled-recorded-rsvp'
        })
      }).then(function(r){
        if(r.ok){
          status.style.color='#5cd68a';
          txt(status,"You're in — we'll reach out when lineup drops.");
          nameIn.value='';emailIn.value='';
        } else {
          status.style.color='#ff6b6b';txt(status,'Something went wrong — try again.');
        }
      }).catch(function(){
        status.style.color='#ff6b6b';txt(status,'Something went wrong — try again.');
      }).finally(function(){btn.disabled=false;txt(btn,'Notify Me');});
    }
    btn.onclick=submit;
    emailIn.onkeydown=function(e){if(e.key==='Enter')submit();};
  }

  /* ── FOOTER ── */
  function renderFooter(links){
    var f=el('footer');f.id='footer';
    var fl=div('footer-links');
    if(links&&links.edmFeed){
      var l1=el('a','footer-link');l1.href=links.edmFeed;txt(l1,'◉ EDM OATS Feed');fl.appendChild(l1);
    }
    if(links&&links.instagram){
      var l2=el('a','footer-link');l2.href=links.instagram;l2.target='_blank';l2.rel='noopener';txt(l2,'◆ Instagram');fl.appendChild(l2);
    }
    var l3=el('a','footer-link');l3.href='/';txt(l3,'← Fook\'n Oats');fl.appendChild(l3);
    f.appendChild(fl);
    var brand=div('footer-brand');txt(brand,'EDM Oatmeal Presents · Rolled & Recorded · fookn-oats.enterprises');
    f.appendChild(brand);
    var stamp=div('footer-brand');txt(stamp,RR_VERSION);stamp.style.marginTop='6px';stamp.style.opacity='.5';
    f.appendChild(stamp);
    root.appendChild(f);
  }

  /* ── PORTILLO'S ── */
  function renderPortillos(){
    var sec=div('section');
    var label=div('section-label');txt(label,'Pre-Show Fuel');sec.appendChild(label);
    var card=div();
    card.style.cssText='border:1px solid rgba(255,180,0,0.15);background:rgba(14,14,14,0.9);padding:24px 22px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap';
    var copy=div();
    var h=div();h.style.cssText='font-family:var(--serif);font-weight:700;font-size:18px;margin-bottom:5px';txt(h,"Where's the nearest Portillo's?");
    var sub=div();sub.style.cssText='font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted)';txt(sub,'Italian beef. Hot dogs. Before or after the show.');
    copy.appendChild(h);copy.appendChild(sub);
    var btn=el('a');
    btn.href='https://locations.portillos.com';btn.target='_blank';btn.rel='noopener';
    btn.style.cssText='flex-shrink:0;display:inline-block;background:var(--gold);color:#080808;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:11px 20px;white-space:nowrap;text-decoration:none;transition:opacity .18s';
    txt(btn,'Find One Near Me');
    btn.onmouseover=function(){this.style.opacity='.8'};
    btn.onmouseout=function(){this.style.opacity='1'};
    card.appendChild(copy);card.appendChild(btn);
    sec.appendChild(card);root.appendChild(sec);
  }

  /* ── SESSIONS ── */
  function renderSessions(mount){
    fetch('/rr-events/index.json?t='+Date.now())
      .then(function(r){return r.json();})
      .then(function(idx){
        var events=idx.events||[];if(!events.length){mount.parentNode&&mount.parentNode.removeChild(mount);return;}
        var label=div('section-label');txt(label,'Sessions');mount.appendChild(label);
        var grid=div();grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px';
        events.forEach(function(ev){
          var card=el('a');
          card.href='/rolled-recorded-event?slug='+ev.slug;
          card.style.cssText='display:block;border:1px solid rgba(255,180,0,0.25);background:rgba(14,14,14,0.9);padding:26px 22px;text-decoration:none;transition:border-color .18s,background .18s,transform .18s;cursor:pointer';
          card.onmouseover=function(){this.style.borderColor='#ffb400';this.style.background='rgba(255,180,0,0.05)';this.style.transform='translateY(-2px)'};
          card.onmouseout=function(){this.style.borderColor='rgba(255,180,0,0.25)';this.style.background='rgba(14,14,14,0.9)';this.style.transform=''};
          var sessTxt=div();sessTxt.style.cssText='font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:#ffb400;text-transform:uppercase;margin-bottom:10px';txt(sessTxt,ev.session||ev.slug);
          var theme=div();theme.style.cssText='font-family:var(--serif);font-weight:700;font-size:20px;color:#fff;margin-bottom:14px;line-height:1.2';txt(theme,ev.theme||'Session Details');
          var meta=div();meta.style.cssText='font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,0.4);text-transform:uppercase;display:flex;align-items:center;gap:10px';
          var statusDot=ev.status==='live'?'<span style="color:#ff3b3b">◉ LIVE NOW</span>':ev.status==='past'?'<span>○ PAST</span>':'<span style="color:rgba(255,180,0,0.6)">○ '+(ev.dateDisplay||'DATE TBA')+'</span>';
          meta.innerHTML=statusDot;
          var arrow=div();arrow.style.cssText='font-family:var(--mono);font-size:11px;color:rgba(255,180,0,0.5);margin-top:16px;letter-spacing:.1em';txt(arrow,'View Session →');
          card.appendChild(sessTxt);card.appendChild(theme);card.appendChild(meta);card.appendChild(arrow);
          grid.appendChild(card);
        });
        mount.appendChild(grid);
      }).catch(function(){});
  }

  /* ── RENDER ── */
  function render(data){
    renderHero(data.event||{});
    renderConcept(data.concept);
    // Sessions mount — placed here so cards appear right after concept
    var sessionsSec=div('section');root.appendChild(sessionsSec);
    renderSessions(sessionsSec);
    renderLineup(data.lineup);
    renderSchedule(data.schedule);
    renderRSVP(data.rsvp);
    renderPortillos();
    renderFooter(data.links);
  }

  fetch('./rolled-recorded.json?t='+Date.now())
    .then(function(r){return r.json();})
    .then(render)
    .catch(function(){
      root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:IBM Plex Mono,monospace;color:rgba(255,255,255,0.25);font-size:12px;letter-spacing:.1em">Loading…</div>';
    });
})();
</script>
</body>
</html>
